<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Diagram</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f1ea;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1 { margin-bottom: 8px; }
    p { margin-top: 0; color: #555; }
    .frame {
      width: min(100%, 1100px);
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 16px;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>House Diagram</h1>
  <p>Clean digital version of the provided sketch.</p>
  <div class="frame">
    <img src="./house-diagram.svg" alt="House diagram" />
  </div>
</body>
</html>
