<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Card You Pick</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1c1031, #32175a 50%, #5b2a86);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: min(900px, 92vw);
      text-align: center;
    }
    .banner {
      background: rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 28px 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 3rem;
      color: #ffd166;
    }
    .line {
      font-size: 1.45rem;
      line-height: 1.6;
      color: #f5ecff;
    }
    .card-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }
    .card-wrap img {
      width: min(280px, 80vw);
      height: auto;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    }
    .card-name {
      margin-top: 16px;
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff1b8;
    }
    @media (max-width: 700px) {
      h1 { font-size: 2.2rem; }
      .line { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="banner">
      <h1>🃏 The Card You Pick</h1>
      <div class="line">On Sunday, April 5, 2026, Lonnie would pick the 5 of Spades.</div>
    </div>

    <div class="card-wrap">
      <img src="cards/5_of_spades.svg" alt="5 of Spades">
      <div class="card-name">5 of Spades</div>
    </div>
  </div>
</body>
</html>
